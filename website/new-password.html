<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Password - KisanMitra</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .new-password-header { padding: 40px 16px 12px; display: flex; align-items: center; border-bottom: 1px solid #EEEEEE; }
        .icon-bg { width: 140px; height: 140px; background: var(--light-green); border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 40px auto 32px; }
        .title { font-size: 22px; font-weight: bold; text-align: center; }
        .subtitle { font-size: 16px; color: var(--grey); text-align: center; margin-top: 12px; }
        .form-label { font-size: 14px; color: var(--grey); margin-bottom: 8px; display: block; }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Desktop Visual Side -->
        <div class="login-visual-side">
            <div class="visual-content">
                <i data-lucide="lock" size="100" stroke-width="1.5"></i>
                <h1 class="visual-title">Secure Access</h1>
                <p class="visual-subtitle">Set a strong password to protect your agricultural data.</p>
                <div class="visual-features">
                    <div class="feature-item"><i data-lucide="check-circle"></i> Strong Passwords</div>
                    <div class="feature-item"><i data-lucide="shield-check"></i> Account Integrity</div>
                    <div class="feature-item"><i data-lucide="refresh-cw"></i> Easy Recovery</div>
                </div>
            </div>
        </div>

        <div class="register-gradient">
            <header class="new-password-header">
                <a href="reset-password.html" style="color: black;"><i data-lucide="arrow-left"></i></a>
                <h2 style="margin-left: 24px; font-size: 18px; font-weight: bold;">New Password</h2>
            </header>
            <main class="p-24" style="text-align: center;">
                <div class="branding-icon mobile-only" style="margin-bottom: 24px; color: var(--vibrant-green);">
                    <i data-lucide="key" size="80" color="var(--vibrant-green)"></i>
                </div>
                <h1 class="title">Set New Password</h1>
                <p class="subtitle">Enter the OTP sent to your email and set a new password</p>
                <div class="card-white" style="margin-top: 32px; padding: 40px 24px; text-align: left;">
                    <label class="form-label" style="font-size: 14px; margin-bottom: 8px; display: block;">6-Digit OTP</label>
                    <input type="text" id="otp-input" class="input-field" placeholder="6-digit OTP" maxlength="6">
                    
                    <label class="form-label" style="margin-top: 16px; font-size: 14px; margin-bottom: 8px; display: block;">New Password</label>
                    <input type="password" id="new-password" class="input-field" placeholder="••••••••">
                    
                    <label class="form-label" style="margin-top: 16px; font-size: 14px; margin-bottom: 8px; display: block;">Confirm Password</label>
                    <input type="password" id="confirm-password" class="input-field" placeholder="••••••••">
                    
                    <div id="error-msg" style="display:none; color:red; font-size:14px; margin-top:8px;"></div>
                    <button class="btn-primary mt-16" id="reset-btn">Reset Password</button>
                    
                    <a href="login.html" style="display: block; text-align: center; margin-top: 24px; color: var(--vibrant-green); font-weight: bold; text-decoration: none;">Back to Login</a>
                </div>
            </main>
        </div>
    </div>
    <script type="module">
        import { auth } from './js/api.js';
        lucide.createIcons();
        const otpInput = document.getElementById('otp-input');
        const newPwdInput = document.getElementById('new-password');
        const confirmPwdInput = document.getElementById('confirm-password');
        const btn = document.getElementById('reset-btn');
        const errorMsg = document.getElementById('error-msg');
        const email = localStorage.getItem('reset_email');
        if (!email) window.location.href = 'reset-password.html';

        btn.addEventListener('click', async () => {
            const otp = otpInput.value.trim();
            const newPwd = newPwdInput.value;
            const confirmPwd = confirmPwdInput.value;
            if (!otp || !newPwd || !confirmPwd) { errorMsg.textContent = 'Please fill all fields.'; errorMsg.style.display = 'block'; return; }
            
            const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/;
            if (!passwordRegex.test(newPwd)) {
                errorMsg.textContent = 'Password must be at least 8 characters, include one uppercase, one lowercase, one number, and one special symbol (@$!%*?&)';
                errorMsg.style.display = 'block';
                return;
            }

            if (newPwd !== confirmPwd) { errorMsg.textContent = 'Passwords do not match.'; errorMsg.style.display = 'block'; return; }
            try {
                btn.disabled = true; btn.textContent = 'Resetting...'; errorMsg.style.display = 'none';
                await auth.resetPassword(email, otp, newPwd, confirmPwd);
                alert('Password reset successful! Please login.');
                localStorage.removeItem('reset_email');
                window.location.href = 'login.html';
            } catch(err) { errorMsg.textContent = err.message; errorMsg.style.display = 'block'; }
            finally { btn.disabled = false; btn.textContent = 'Reset Password'; }
        });
    </script>
</body>
</html>
