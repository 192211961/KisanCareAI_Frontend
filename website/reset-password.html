<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - KisanMitra</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .reset-header { padding: 40px 16px 12px; display: flex; align-items: center; border-bottom: 2px solid #EEEEEE; background: white; }
        .reset-header h2 { margin-left: 24px; font-size: 18px; font-weight: 800; }
        
        .icon-bg { width: 140px; height: 140px; background: var(--light-green); border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 40px auto 32px; }
        .title { font-size: 22px; font-weight: 800; text-align: center; }
        .subtitle { font-size: 16px; color: var(--grey); text-align: center; margin: 12px 0 40px; }
        
        .form-label { font-size: 14px; color: var(--grey); margin-bottom: 8px; display: block; font-weight: 600; }
        .back-to-login { display: block; text-align: center; margin-top: 24px; color: var(--vibrant-green); font-weight: 800; text-decoration: none; font-size: 16px; }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Desktop Visual Side -->
        <div class="login-visual-side">
            <div class="visual-content">
                <i data-lucide="key" size="100" stroke-width="1.5"></i>
                <h1 class="visual-title">Recovery</h1>
                <p class="visual-subtitle">Quick and secure access recovery for your farming account.</p>
                <div class="visual-features">
                    <div class="feature-item"><i data-lucide="mail"></i> OTP over Email</div>
                    <div class="feature-item"><i data-lucide="shield"></i> 256-bit Encryption</div>
                    <div class="feature-item"><i data-lucide="help-circle"></i> 24/7 Support</div>
                </div>
            </div>
        </div>

        <div class="register-gradient">
            <header class="reset-header">
                <a href="login.html" style="color: black;"><i data-lucide="arrow-left"></i></a>
                <h2>Reset Password</h2>
            </header>
            
            <main class="p-24" style="text-align: center;">
                <div class="branding-icon mobile-only" style="margin-bottom: 24px; color: var(--vibrant-green);">
                    <i data-lucide="key" size="80" stroke-width="2"></i>
                </div>
                <h1 class="title">Forgot Password?</h1>
                <p class="subtitle">Enter your registered email to receive<br>a password reset OTP</p>
                
                <div class="card-white" style="margin-top: 32px; padding: 40px 24px; text-align: left;">
                    <label class="form-label" style="font-size: 14px; margin-bottom: 8px; display: block;">Email Address</label>
                    <div class="input-wrapper">
                        <i data-lucide="mail" class="input-icon"></i>
                        <input type="email" id="reset-email" class="input-field" placeholder="your@gmail.com">
                    </div>
                    
                    <div id="error-message" style="display: none;"></div>
                    <button class="btn-primary mt-16" id="send-otp-btn">Send OTP</button>
                    
                    <a href="login.html" class="back-to-login">Back to Login</a>
                </div>
            </main>
        </div>
    </div>
    <script type="module">
        import { auth } from './js/api.js';
        lucide.createIcons();
        const emailInput = document.getElementById('reset-email');
        const btn = document.getElementById('send-otp-btn');
        const errorMsg = document.getElementById('error-message');
        
        btn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            if (!email) { 
                errorMsg.textContent = 'Please enter your email.'; 
                errorMsg.className = 'error-text';
                errorMsg.style.display = 'block'; 
                return; 
            }
            try {
                btn.disabled = true; 
                btn.innerHTML = '<span class="spinner"></span>Sending OTP...'; 
                errorMsg.style.display = 'none';
                
                await auth.forgotPassword(email);
                localStorage.setItem('reset_email', email);
                window.location.href = 'new-password.html';
            } catch(err) { 
                errorMsg.textContent = err.message; 
                errorMsg.className = 'error-text';
                errorMsg.style.display = 'block'; 
            } finally { 
                btn.disabled = false; 
                btn.textContent = 'Send OTP'; 
            }
        });
    </script>
</body>
</html>
