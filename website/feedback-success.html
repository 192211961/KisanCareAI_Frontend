<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Success - KisanMitra</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .success-main {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 24px;
        }
        .check-circle {
            width: 100px;
            height: 100px;
            background: var(--light-green);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 32px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <main class="success-main">
            <div class="check-circle">
                <i data-lucide="check" size="60" color="var(--vibrant-green)"></i>
            </div>
            <h1 style="font-size: 28px; font-weight: bold; color: var(--black);">Thank You!</h1>
            <p style="margin-top: 16px; color: var(--grey); font-size: 16px; line-height: 1.5;">Your feedback has been submitted successfully. We appreciate your contribution to making KisanMitra better for everyone.</p>
            
            <button class="btn-primary" style="margin-top: 48px;" onclick="window.location.href='home.html'">Back to Home</button>
        </main>
    </div>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
