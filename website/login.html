<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - KisanMitra</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .login-gradient {
            background: linear-gradient(270deg, var(--white), var(--light-green));
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .login-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px;
            justify-content: center;
        }
        .branding-icon {
            color: var(--vibrant-green);
            margin-bottom: 24px;
        }
        .welcome-text {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--black);
        }
        .sub-text {
            color: var(--grey);
            font-size: 16px;
            margin-bottom: 40px;
            text-align: center;
        }
        .form-card {
            width: 100%;
        }
        .forgot-password {
            display: block;
            text-align: right;
            color: var(--vibrant-green);
            font-size: 14px;
            font-weight: 700;
            margin-top: 12px;
            text-decoration: none;
        }
        .register-link {
            margin-top: 32px;
            font-size: 16px;
            color: var(--grey);
        }
        .register-link a {
            color: var(--vibrant-green);
            font-weight: bold;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Desktop Visual Side -->
        <div class="login-visual-side">
            <div class="visual-content">
                <i data-lucide="sprout" size="100" stroke-width="1.5"></i>
                <h1 class="visual-title">KisanMitra</h1>
                <p class="visual-subtitle">Revolutionizing agriculture through technology and AI.</p>
                <div class="visual-features">
                    <div class="feature-item"><i data-lucide="scan"></i> Fast Disease Detection</div>
                    <div class="feature-item"><i data-lucide="cloud"></i> Hyper-local Weather</div>
                    <div class="feature-item"><i data-lucide="message-square"></i> Expert AI Support</div>
                </div>
            </div>
        </div>

        <div class="login-gradient">
            <main class="login-content">
                <div class="branding-icon mobile-only">
                    <i data-lucide="sprout" size="80" stroke-width="2"></i>
                </div>
                <h1 class="welcome-text">Welcome Back</h1>
                <p class="sub-text">Login to continue your farming journey</p>

                <div class="card-white form-card">
                    <h2 style="font-size: 20px; font-weight: bold; margin-bottom: 24px;">Login</h2>
                    
                    <div class="input-wrapper">
                        <i data-lucide="mail" class="input-icon"></i>
                        <input type="email" id="email" class="input-field" placeholder="Email Address">
                    </div>
                    
                    <div class="input-wrapper">
                        <i data-lucide="lock" class="input-icon"></i>
                        <input type="password" id="password" class="input-field" placeholder="Password">
                    </div>
                    
                    <a href="reset-password.html" class="forgot-password">Forgot Password?</a>
                    <div id="error-message" style="display: none;"></div>
                    <button class="btn-primary mt-32" id="login-btn">Login</button>
                </div>

                <p class="register-link">
                    Don't have an account? <a href="register.html">Register</a>
                </p>
            </main>
        </div>
    </div>
    <script type="module">
        import { auth } from './js/api.js';

        lucide.createIcons();

        const loginBtn = document.getElementById('login-btn');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const errorMsg = document.getElementById('error-message');

        loginBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();

            if (!email || !password) {
                errorMsg.textContent = 'Please fill in all fields';
                errorMsg.className = 'error-text';
                errorMsg.style.display = 'block';
                return;
            }

            try {
                loginBtn.disabled = true;
                loginBtn.innerHTML = '<span class="spinner"></span>Logging in...';
                errorMsg.style.display = 'none';

                const response = await auth.login(email, password);
                
                // Save session info
                localStorage.setItem('user_email', response.email);
                localStorage.setItem('user_name', response.full_name);

                window.location.href = 'home.html';

            } catch (error) {
                errorMsg.textContent = error.message;
                errorMsg.className = 'error-text';
                errorMsg.style.display = 'block';
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
            }
        });
    </script>
</body>
</html>
