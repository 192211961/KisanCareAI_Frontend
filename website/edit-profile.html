<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Information - KisanMitra</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .edit-header {
            padding: 40px 16px 12px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #EEEEEE;
        }
        .form-group {
            margin-top: 20px;
        }
        .form-label {
            font-size: 14px;
            color: var(--grey);
            margin-bottom: 8px;
            display: block;
        }
        .edit-action {
            float: right;
            color: var(--vibrant-green);
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="desktop-sidebar">
            <div class="sidebar-logo">
                <i data-lucide="sprout" size="32"></i>
                <span>KisanMitra</span>
            </div>
            <nav class="sidebar-nav">
                <a href="home.html" class="sidebar-link"><i data-lucide="home"></i> Home</a>
                <a href="disease-detection.html" class="sidebar-link"><i data-lucide="camera"></i> Crop Scan</a>
                <a href="weather.html" class="sidebar-link"><i data-lucide="cloud-sun"></i> Weather</a>
                <a href="ask-question.html" class="sidebar-link"><i data-lucide="message-square"></i> Ask AI</a>
                <a href="history.html" class="sidebar-link"><i data-lucide="history"></i> History</a>
                <a href="settings.html" class="sidebar-link active"><i data-lucide="settings"></i> Settings</a>
            </nav>
            <div class="sidebar-footer">
                <a href="login.html" class="sidebar-link" style="color: var(--soft-red);"><i data-lucide="log-out"></i> Logout</a>
            </div>
        </aside>

        <div class="main-content-layout">
            <header class="edit-header">
                <a href="settings.html" style="color: black;"><i data-lucide="arrow-left"></i></a>
                <h2 style="margin-left: 24px; font-size: 18px; font-weight: bold;">Personal Information</h2>
            </header>

        <main class="p-24" style="padding-bottom: 100px;">
            <div class="form-group">
                <span class="edit-action">Edit</span>
                <label class="form-label">Full Name</label>
                <input type="text" class="input-field" value="Demo Farmer" disabled oninput="this.value = this.value.replace(/[^a-zA-Z\s]/g, '')">
            </div>

            <div class="form-group">
                <label class="form-label">Mobile Number</label>
                <input type="tel" class="input-field" placeholder="Enter mobile number">
            </div>

            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="input-field" value="dj@gmail.com" disabled style="color: var(--grey);">
            </div>

            <div class="form-group">
                <label class="form-label">Pincode</label>
                <input type="tel" id="pincode-input" class="input-field" placeholder="6-digit pincode" maxlength="6" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 6)">
                <span id="pincode-error" style="color: #DC2626; font-size: 12px; margin-top: 4px; display: none;">Invalid Pincode</span>
            </div>

            <div class="form-group">
                <label class="form-label">State</label>
                <input type="text" class="input-field" placeholder="State (Auto-filled)" disabled>
            </div>

            <div class="form-group">
                <label class="form-label">District</label>
                <input type="text" class="input-field" placeholder="District (Auto-filled)" disabled>
            </div>

            <button class="btn-primary" style="margin-top: 40px;">Save All Changes</button>
        </main>
        </div> <!-- End of main-content-layout -->
    </div>
    <script type="module">
        import { profile } from './js/api.js';

        lucide.createIcons();

        const email = localStorage.getItem('user_email');
        if (!email) window.location.href = 'login.html';

        const nameInput = document.querySelector('input[type="text"]');
        const mobileInput = document.querySelector('input[type="tel"]');
        const emailInput = document.querySelector('input[type="email"]');
        const pincodeInput = document.getElementById('pincode-input');
        const stateInput = document.querySelectorAll('input[type="text"]')[1];
        const districtInput = document.querySelectorAll('input[type="text"]')[2];
        const saveBtn = document.querySelector('.btn-primary');

        async function loadProfile() {
            try {
                const data = await profile.get(email);
                nameInput.value = data.full_name || '';
                mobileInput.value = data.mobile || '';
                emailInput.value = data.email || '';
                pincodeInput.value = data.pincode || '';
                stateInput.value = data.state || '';
                districtInput.value = data.district || '';
            } catch (error) {
                console.error('Error loading profile:', error);
            }
        }

        saveBtn.addEventListener('click', async () => {
            const name = nameInput.value.trim();
            if (name.length < 3) {
                alert('Full Name must be at least 3 characters');
                return;
            }

            const data = {
                email,
                full_name: name,
                mobile: mobileInput.value,
                pincode: pincodeInput.value,
                state: stateInput.value,
                district: districtInput.value
            };

            try {
                saveBtn.disabled = true;
                saveBtn.textContent = 'Saving...';
                await profile.update(data);
                localStorage.setItem('user_name', data.full_name);
                alert('Profile updated successfully!');
            } catch (error) {
                alert('Error updating profile: ' + error.message);
            } finally {
                saveBtn.disabled = false;
                saveBtn.textContent = 'Save All Changes';
            }
        });

        // Pincode Autofill Logic
        pincodeInput.addEventListener('input', async () => {
            const pincode = pincodeInput.value;
            const errorSpan = document.getElementById('pincode-error');
            
            if (pincode.length === 6) {
                try {
                    errorSpan.style.display = 'none';
                    stateInput.value = 'Searching...';
                    districtInput.value = 'Searching...';
                    
                    const res = await fetch(`https://api.postalpincode.in/pincode/${pincode}`);
                    const data = await res.json();
                    
                    if (data[0].Status === "Success") {
                        const postOffice = data[0].PostOffice[0];
                        stateInput.value = postOffice.State;
                        districtInput.value = postOffice.District;
                    } else {
                        stateInput.value = '';
                        districtInput.value = '';
                        errorSpan.style.display = 'block';
                    }
                } catch (error) {
                    console.error('Pincode API error:', error);
                    stateInput.value = '';
                    districtInput.value = '';
                }
            } else {
                errorSpan.style.display = 'none';
            }
        });

        loadProfile();
    </script>
</body>
</html>
